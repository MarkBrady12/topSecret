<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A Walk Through the Forest ✨</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Floating magical particles -->
  <div id="particles"></div>

  <!-- Opening scene -->
  <section class="intro">
    <h1>Take a walk with me 🌲✨</h1>
    <p>Just wander a little...</p>
  </section>

  <!-- Memory moments while scrolling -->
  <section class="memory">
    <img src="images/memory1.jpg" />
    <p>That one time we couldn’t stop laughing 😂</p>
  </section>

  <section class="memory">
    <img src="images/memory2.jpg" />
    <p>Still one of my favorite days 💫</p>
  </section>

  <section class="memory">
    <img src="images/memory3.jpg" />
    <p>Proof we’re adorable 😌</p>
  </section>

  <!-- Valentine reveal -->
  <section class="question" id="question">
    <h2>Will you be my Valentine? 💖</h2>
    <div class="buttons">
      <button id="yes">Yes 💕</button>
      <button id="no">No 😅</button>
    </div>
  </section>

  <!-- Ambient audio -->
  <audio id="forest-audio" loop>
    <source src="audio/forest.mp3" type="audio/mpeg">
  </audio>

  <audio id="hell-audio" loop>
    <source src="audio/hell.mp3" type="audio/mpeg">
  </audio>

  <audio id="boss-audio" loop>
    <source src="audio/boss.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
